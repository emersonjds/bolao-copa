# Deploy estático no Netlify.
# O projeto é Next.js com output: "export" — gera a pasta out/ 100% estática.
# Publicamos out/ direto; o runtime SSR do Netlify fica desligado de propósito.

[build]
  command = "pnpm build"
  publish = "out"

[build.environment]
  # Trata o site como estático puro: não roda o plugin de SSR do Next,
  # que publicaria a pasta errada e deixaria o site sem abrir.
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # Supply-chain: o build falha se o lockfile não bater com package.json,
  # impedindo que uma dependência seja trocada silenciosamente no Netlify
  # (relevante para a integridade do payload PIX/QR).
  PNPM_FLAGS = "--frozen-lockfile"
  NPM_FLAGS = "--frozen-lockfile"
